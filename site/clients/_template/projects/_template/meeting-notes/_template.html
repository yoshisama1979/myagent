<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打ち合わせメモ — YYYY-MM-DD</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">
<div class="max-w-4xl mx-auto p-6 md:p-10">

  <h1 class="text-3xl font-bold mb-2">打ち合わせメモ — YYYY-MM-DD</h1>
  <p class="text-gray-600 mb-8">打ち合わせの生記録。後で <a href="../decisions.html" class="text-blue-600 hover:underline">decisions.html</a> / <a href="../backlog.html" class="text-blue-600 hover:underline">backlog.html</a> に展開する。</p>

  <h2 class="text-xl font-semibold border-b border-gray-300 pb-2 mb-4 mt-10">出席者</h2>
  <ul class="list-disc list-inside space-y-1 text-sm">
    <li>氏名（所属）</li>
  </ul>

  <h2 class="text-xl font-semibold border-b border-gray-300 pb-2 mb-4 mt-10">議題・決定事項</h2>
  <h3 class="text-lg font-semibold mb-3 mt-6">議題1</h3>
  <ul class="list-disc list-inside space-y-1 text-sm">
    <li>内容</li>
  </ul>

  <h2 class="text-xl font-semibold border-b border-gray-300 pb-2 mb-4 mt-10">要確認・宿題</h2>
  <ul class="list-disc list-inside space-y-1 text-sm">
    <li>未確認事項・持ち帰り</li>
  </ul>

  <h2 class="text-xl font-semibold border-b border-gray-300 pb-2 mb-4 mt-10">次のアクション</h2>
  <ul class="list-disc list-inside space-y-1 text-sm">
    <li>次に行うこと</li>
  </ul>

  <hr class="my-8 border-gray-300">
  <p class="text-sm text-gray-500">展開ステータス：未展開（展開完了時に「YYYY-MM-DD decisions.html / backlog.html に展開済み」と記載）</p>

</div>
</body>
</html>
