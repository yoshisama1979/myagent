<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>決定事項・確定仕様</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">
<div class="max-w-4xl mx-auto p-6 md:p-10">

  <h1 class="text-3xl font-bold mb-2">決定事項・確定仕様 — <span class="text-gray-500">[プロジェクト名]</span></h1>
  <p class="text-gray-600 mb-4">確定した仕様・決定事項・既存実装の前提を背景確認用に記録する。</p>
  <p class="text-sm text-gray-500 mb-8">実装タスクは <a href="backlog.html" class="text-blue-600 hover:underline">backlog.html</a> 参照。</p>

  <h2 class="text-xl font-semibold border-b border-gray-300 pb-2 mb-4 mt-10">仕様</h2>

  <h3 class="text-lg font-semibold mb-3 mt-6">[項目名]（YYYY-MM-DD 決定）</h3>
  <ul class="list-disc list-inside space-y-1 text-sm">
    <li>結論をファーストで記載</li>
  </ul>

  <h2 class="text-xl font-semibold border-b border-gray-300 pb-2 mb-4 mt-10">アーキテクチャ・運用</h2>
  <ul class="list-disc list-inside space-y-1 text-sm">
    <li>確定した構造・運用方針</li>
  </ul>

</div>
</body>
</html>
