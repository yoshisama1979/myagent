; PHP-FPM プール設定: myagent 専用
; 配置先: /etc/php/8.5/fpm/pool.d/myagent.conf
; 目的:
;   - vpsuser 権限で PHP を動かし、myagent 配下のファイルを直接読み書きできるようにする
;   - Nginx (www-data) から Unix ソケット経由でアクセス
;   - デフォルトの www.conf は無効化（www.conf.disabled にリネーム想定）

[myagent]

; 実行ユーザを vpsuser に固定（重要）
user  = vpsuser
group = vpsuser

; Unix ソケットで待ち受け（TCPより高速・安全）
listen       = /run/php/php-myagent.sock
listen.owner = www-data
listen.group = www-data
listen.mode  = 0660

; プロセス管理: 個人運用想定で必要な時だけ起動（リソース節約）
pm                     = ondemand
pm.max_children        = 5
pm.process_idle_timeout = 10s
pm.max_requests        = 500

; 作業ディレクトリ
chdir = /home/vpsuser/projects/myagent

; PHP 経由で実行する Python に必要な PATH を渡す（python3, git 等を探せるように）
env[PATH] = /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

; エラーログ
php_admin_value[error_log] = /var/log/php-myagent.error.log
php_admin_flag[log_errors] = on

; セキュリティ
php_admin_value[expose_php] = Off
