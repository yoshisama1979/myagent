server {
    listen 100.123.104.87:80;
    server_name _;

    root /home/vpsuser/projects/myagent/site;
    index index.html index.php;

    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    location / {
        try_files $uri $uri/ =404;
    }

    # PHP ハンドラ（PHP-FPM myagent プール経由）
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php-myagent.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # data/ / bin/ / etc/ 等は念のためブロック（root が site/ なので元々届かないが二重防御）
    location ~ ^/(data|bin|etc|rules|\.claude|\.git)/ {
        deny all;
    }

    access_log /var/log/nginx/myagent-preview.access.log;
    error_log  /var/log/nginx/myagent-preview.error.log;
}
